id: nuxtblog-plugin-reading-time
title: 阅读时间
version: 2.0.0
icon: i-tabler-clock
author: nuxtblog
description: 在文章渲染时自动计算并注入阅读时间提示

type: js
runtime: interpreted
trust_level: official
license: MIT
sdk_version: "1.0.0"
priority: 10

repo: https://github.com/nuxtblog/nuxtblog-plugin-reading-time
homepage: https://github.com/nuxtblog/nuxtblog-plugin-reading-time
tags: [reading-time, ux]

js_entry: dist/plugin.js

settings:
  - key: cn_cpm
    label: 中文阅读速度（字/分钟）
    type: number
    default: 400
    description: 每分钟阅读中文字符数，建议 300–500
    group: 速度

  - key: en_wpm
    label: 英文阅读速度（词/分钟）
    type: number
    default: 200
    description: 每分钟阅读英文单词数，建议 150–250
    group: 速度

  - key: label
    label: 标签文本
    type: string
    default: 预计阅读
    description: 显示在阅读时间前面的文本
    group: 显示

  - key: unit
    label: 时间单位
    type: string
    default: 分钟
    group: 显示

  - key: less_than_one
    label: 不足一分钟文案
    type: string
    default: 不足 1 分钟
    description: 阅读时间不足 1 分钟时显示的文字
    group: 显示

  - key: position
    label: 注入位置
    type: select
    default: top
    options: [top, bottom]
    description: 将阅读时间插入到内容顶部或底部
    group: 显示

  - key: only_posts
    label: 仅文章生效
    type: boolean
    default: true
    description: 关闭后，页面（page）类型也会显示阅读时间
    group: 基础配置
